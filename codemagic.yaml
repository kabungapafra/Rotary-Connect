workflows:
  android-workflow:
    name: Android
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/**/*.apk

  ios-workflow:
    name: iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
      # No Apple Developer signing set up yet, so this build is
      # unsigned — it proves the app actually compiles for iOS (which
      # nothing in this project could verify before now, having been
      # built on Linux all along), not that it's ready for TestFlight.
      # Add code signing (see Codemagic's iOS signing docs) once an
      # Apple Developer account and certificates exist, then switch
      # this to `flutter build ipa` for a distributable build.
      - name: Build iOS (unsigned)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
