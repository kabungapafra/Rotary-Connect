name: rotary_connect
description: Rotary Club of Mbalwa member app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  gal: ^2.3.0
  http: ^1.2.0
  image_picker: ^1.2.3
  mobile_scanner: ^7.2.0
  pdf: ^3.11.1
  printing: ^5.13.4
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/rotary_mbalwa_logo.png
    - assets/images/rotary_mbalwa_words.png
    - assets/images/rotary_connect_wheel.png
    - assets/images/rotary_wheel_spin.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
